<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision | Pet Classifier</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: { 850: '#151e2e', 900: '#0f172a' },
                        brand: { 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb' }
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen flex items-center justify-center p-4 font-sans antialiased selection:bg-brand-500 selection:text-white">

    <div class="w-full max-w-md relative">
        <div class="absolute -inset-1 bg-gradient-to-r from-brand-600 to-indigo-600 rounded-2xl blur opacity-25"></div>
        
        <div class="relative bg-slate-900/90 border border-slate-700/50 backdrop-blur-xl rounded-2xl p-8 shadow-2xl">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-slate-800 border border-slate-700 mb-4 shadow-inner">
                    <svg class="w-6 h-6 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-white tracking-tight">Visual Analysis Network</h1>
                <p class="text-sm text-slate-400 mt-2">Upload a portrait to initialize neural classification.</p>
            </div>

            <div id="dropZone" class="group relative flex flex-col items-center justify-center w-full h-48 border-2 border-slate-700 border-dashed rounded-xl cursor-pointer bg-slate-800/50 hover:bg-slate-800 hover:border-brand-500 transition-all duration-300">
                <div class="flex flex-col items-center justify-center pt-5 pb-6">
                    <svg class="w-10 h-10 mb-3 text-slate-500 group-hover:text-brand-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <p class="mb-2 text-sm text-slate-400"><span class="font-semibold text-brand-400">Click to upload</span> or drag and drop</p>
                    <p class="text-xs text-slate-500">PNG, JPG or JPEG (Max. 10MB)</p>
                </div>
                <input id="fileInput" type="file" class="hidden" accept="image/*" />
            </div>

            <div id="previewContainer" class="hidden relative w-full h-48 mb-6 rounded-xl overflow-hidden shadow-lg border border-slate-700">
                <img id="imagePreview" class="object-cover w-full h-full" alt="Upload Preview">
                <button id="clearBtn" class="absolute top-2 right-2 p-1.5 bg-slate-900/70 hover:bg-red-500/90 text-white rounded-lg backdrop-blur-sm transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <button id="predictBtn" class="hidden w-full relative overflow-hidden group bg-brand-600 hover:bg-brand-500 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-brand-500/30 transition-all active:scale-[0.98]">
                <span class="relative z-10 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Process Image
                </span>
            </button>

            <div id="loader" class="hidden flex flex-col items-center justify-center py-4">
                <div class="custom-spinner w-8 h-8 rounded-full border-b-2 border-brand-400 mb-4"></div>
                <p class="text-sm text-brand-400 animate-pulse tracking-wide uppercase font-semibold">Analyzing Data...</p>
            </div>

            <div id="resultBox" class="hidden mt-6 bg-slate-800 rounded-xl p-5 border border-slate-700 shadow-inner">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-xs font-semibold text-slate-400 tracking-wider uppercase">Detection Result</span>
                    <span id="confidenceBadge" class="px-2.5 py-1 rounded-md text-xs font-bold bg-slate-900 border border-slate-700 text-brand-400">--%</span>
                </div>
                <h2 id="resultClass" class="text-3xl font-bold text-white mb-2">Subject</h2>
                
                <div class="w-full bg-slate-900 rounded-full h-2 mt-4 border border-slate-700">
                    <div id="confidenceBar" class="bg-gradient-to-r from-brand-500 to-indigo-400 h-2 rounded-full transition-all duration-1000 ease-out w-0"></div>
                </div>
            </div>

        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
